name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to prepare"
        required: true
        default: "v0.1.2"

permissions:
  contents: write

jobs:
  prepare-prerelease:
    runs-on: macos-26
    environment: release-signing

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${{ inputs.tag }}"
          fi

          case "$release_tag" in
            v0.1.0-beta.1)
              release_title="TypeCarrier 0.1 Beta 1"
              notes_file="docs/releases/0.1-beta.1.md"
              ;;
            v0.1.1)
              release_title="TypeCarrier 0.1.1"
              notes_file="docs/releases/0.1.1.md"
              ;;
            v0.1.2)
              release_title="TypeCarrier 0.1.2"
              notes_file="docs/releases/0.1.2.md"
              ;;
            *)
              release_title="TypeCarrier ${release_tag#v}"
              notes_file="docs/releases/0.1.2.md"
              ;;
          esac

          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=$release_title" >> "$GITHUB_ENV"
          echo "NOTES_FILE=$notes_file" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run project sanity checks
        run: script/ci_sanity.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Check Xcode compatibility
        id: xcode
        run: |
          xcodebuild -version
          version="$(xcodebuild -version | awk '/Xcode/ { print $2 }')"
          major="${version%%.*}"
          if [ "${major:-0}" -ge 26 ]; then
            echo "supports_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "supports_build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Xcode builds because this runner has Xcode $version. TypeCarrier currently targets iOS 26.0 and macOS 26.0."
          fi

      - name: Test core package
        if: steps.xcode.outputs.supports_build == 'true'
        run: |
          xcodebuild \
            -project TypeCarrier.xcodeproj \
            -scheme TypeCarrierCore \
            -destination 'platform=macOS' \
            test

      - name: Build macOS app
        if: steps.xcode.outputs.supports_build == 'true'
        run: |
          xcodebuild \
            -project TypeCarrier.xcodeproj \
            -scheme TypeCarrierMac \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build iOS app
        if: steps.xcode.outputs.supports_build == 'true'
        run: |
          xcodebuild \
            -project TypeCarrier.xcodeproj \
            -scheme TypeCarrieriOS \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify Android signing secrets
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          missing=0
          for name in \
            ANDROID_RELEASE_KEYSTORE_BASE64 \
            ANDROID_RELEASE_STORE_PASSWORD \
            ANDROID_RELEASE_KEY_ALIAS \
            ANDROID_RELEASE_KEY_PASSWORD
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write Android release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          keystore_path="$RUNNER_TEMP/typecarrier-android-release.jks"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "TYPECARRIER_ANDROID_RELEASE_STORE_FILE=$keystore_path" >> "$GITHUB_ENV"

      - name: Build Android APK
        working-directory: Apps/Android
        env:
          TYPECARRIER_ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          TYPECARRIER_ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          TYPECARRIER_ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest assembleRelease

      - name: Prepare Android release asset
        run: |
          mkdir -p dist
          cp Apps/Android/app/build/outputs/apk/release/app-release.apk "dist/TypeCarrier-Android-${RELEASE_TAG}.apk"
          shasum -a 256 "dist/TypeCarrier-Android-${RELEASE_TAG}.apk" > "dist/TypeCarrier-Android-${RELEASE_TAG}.apk.sha256"
          echo "ANDROID_APK=dist/TypeCarrier-Android-${RELEASE_TAG}.apk" >> "$GITHUB_ENV"
          echo "ANDROID_APK_SHA256=dist/TypeCarrier-Android-${RELEASE_TAG}.apk.sha256" >> "$GITHUB_ENV"

      - name: Verify macOS signing secrets
        if: steps.xcode.outputs.supports_build == 'true'
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APPSTORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          missing=0
          for name in \
            DEVELOPER_ID_CERTIFICATE_BASE64 \
            DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APPLE_TEAM_ID \
            APPSTORE_CONNECT_API_KEY_ID \
            APPSTORE_CONNECT_API_PRIVATE_KEY
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Import Developer ID certificate
        if: steps.xcode.outputs.supports_build == 'true'
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ runner.temp }}-${{ github.run_id }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/typecarrier-release.keychain-db"

          echo "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security find-identity -p codesigning -v "$keychain_path"

      - name: Write App Store Connect API key
        if: steps.xcode.outputs.supports_build == 'true'
        env:
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APPSTORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          api_key_path="$RUNNER_TEMP/AuthKey_${APPSTORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APPSTORE_CONNECT_API_PRIVATE_KEY" > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPSTORE_CONNECT_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
          echo "NOTARYTOOL_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Build notarized macOS DMG
        if: steps.xcode.outputs.supports_build == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TYPECARRIER_BUNDLE_PREFIX: ak22ak.typecarrier
          NOTARYTOOL_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          NOTARYTOOL_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}
        run: script/package_macos_developer_id_dmg.sh

      - name: Create or update draft prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --draft
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$NOTES_FILE" \
              --prerelease \
              --draft \
              --verify-tag
          fi

      - name: Upload Android APK to draft prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" "$ANDROID_APK" "$ANDROID_APK_SHA256" --clobber

      - name: Upload macOS DMG to draft prerelease
        if: steps.xcode.outputs.supports_build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" "$MACOS_DMG" "$MACOS_DMG_SHA256" --clobber

      - name: Report release asset status
        run: |
          echo "::notice::Draft prerelease is ready. Android release APK uploaded as $(basename "$ANDROID_APK")."
          if [ -n "${MACOS_DMG:-}" ]; then
            echo "::notice::Notarized macOS DMG uploaded as $(basename "$MACOS_DMG")."
          else
            echo "::notice::macOS DMG was not built because the runner Xcode version is not compatible with this project."
          fi
