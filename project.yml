name: TypeCarrier
options:
  minimumXcodeGenVersion: 2.45.4
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    ENABLE_USER_SCRIPT_SANDBOXING: NO
configFiles:
  Debug: Configs/TypeCarrier.xcconfig
  Release: Configs/TypeCarrier.xcconfig
targets:
  TypeCarrierCore:
    type: framework
    platform: auto
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources/TypeCarrierCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: $(TYPECARRIER_BUNDLE_PREFIX).core
  TypeCarrierCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/TypeCarrierCoreTests
    dependencies:
      - target: TypeCarrierCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: $(TYPECARRIER_BUNDLE_PREFIX).core.tests
        TEST_HOST: ""
  TypeCarrieriOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/iOS
    dependencies:
      - target: TypeCarrierCore
    info:
      path: Apps/iOS/Info.plist
      properties:
        CFBundleDisplayName: TypeCarrier
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocalNetworkUsageDescription: TypeCarrier uses the local network to send text to your nearby Mac.
        NSBonjourServices:
          - _typecarrier._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(TYPECARRIER_BUNDLE_PREFIX).ios
        TARGETED_DEVICE_FAMILY: 1
  TypeCarrierMac:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Apps/macOS
    dependencies:
      - target: TypeCarrierCore
    info:
      path: Apps/macOS/Info.plist
      properties:
        CFBundleDisplayName: TypeCarrier
        LSUIElement: true
        NSLocalNetworkUsageDescription: TypeCarrier uses the local network to receive text from your nearby iPhone.
        NSBonjourServices:
          - _typecarrier._tcp
    entitlements:
      path: Apps/macOS/TypeCarrierMac.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(TYPECARRIER_BUNDLE_PREFIX).mac
schemes:
  TypeCarrierCore:
    build:
      targets:
        TypeCarrierCore: all
    test:
      targets:
        - TypeCarrierCoreTests
  TypeCarrieriOS:
    build:
      targets:
        TypeCarrieriOS: all
  TypeCarrierMac:
    build:
      targets:
        TypeCarrierMac: all
    run:
      config: Debug
